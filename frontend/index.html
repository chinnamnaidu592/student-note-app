<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Notes</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{text-align:center}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4b7bec;
color:white;
}

.primary{
width:100%;
}

.note{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:10px;
background:#fafafa;
}

.row{
display:flex;
gap:10px;
}

#notesSection{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Student Notes App</h1>

<div id="authSection">

<h3>Signup / Login</h3>

<input id="username" placeholder="Username">

<input id="password"
type="password"
placeholder="Password">

<div class="row">
<button onclick="signup()" class="primary">
Signup
</button>

<button onclick="login()" class="primary">
Login
</button>
</div>

</div>

<div id="notesSection">

<button onclick="logout()">
Logout
</button>

<h3>Add Note</h3>

<input id="name"
placeholder="Enter title">

<input id="note"
placeholder="Enter note">

<button onclick="save()"
class="primary">
Submit
</button>

<h3>Your Notes</h3>

<div id="output"></div>

</div>

</div>


<script>

if(localStorage.getItem("token")){

showNotes()

load()

}

function showNotes(){

document.getElementById(
"authSection"
).style.display="none"

document.getElementById(
"notesSection"
).style.display="block"

}

function logout(){

localStorage.removeItem(
"token"
)

location.reload()

}

async function signup(){

let res=await fetch(
"https://student-note-app.onrender.com/signup",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

password:
document.getElementById("password").value

})

})

let data=await res.json()

alert(data.message)

}


async function login(){

let res=await fetch(
"https://student-note-app.onrender.com/login",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

password:
document.getElementById("password").value

})

})

let data=await res.json()

if(data.token){

localStorage.setItem(
"token",
data.token
)

showNotes()

load()

}
else{

alert(
data.message
)

}

}



async function save(){

let data={

name:
document.getElementById(
"name"
).value.trim(),

note:
document.getElementById(
"note"
).value.trim()

}

if(!data.name || !data.note){

alert(
"Fill all fields"
)

return

}

let url="https://student-note-app.onrender.com/add"

let method="POST"

if(window.editId){

url=
`https://student-note-app.onrender.com/update/${window.editId}`

method="PUT"

}

let response=await fetch(
url,
{
method:method,

headers:{

"Content-Type":"application/json",

"token":
localStorage.getItem(
"token"
)

},

body:JSON.stringify(
data
)

}
)

let result=
await response.json()

console.log(result)

window.editId=null

document.getElementById(
"name"
).value=""

document.getElementById(
"note"
).value=""

await load()

}



function edit(
id,
name,
note
){

document.getElementById(
"name"
).value=name

document.getElementById(
"note"
).value=note

window.editId=id

}


async function remove(id){

await fetch(

`https://student-note-app.onrender.com/delete/${id}`,

{

method:"DELETE",

headers:{

"token":
localStorage.getItem(
"token"
)

}

}

)

load()

}



async function load(){

let response=
await fetch(

"https://student-note-app.onrender.com/notes",

{

headers:{

"token":
localStorage.getItem(
"token"
)

}

}

)

let data=
await response.json()

console.log(
"Notes:",
data
)

let html=""

if(Array.isArray(data)){

data.forEach(item=>{

html+=`

<div class="note">

<h3>
${item.name}
</h3>

<p>
${item.note}
</p>

<button
onclick="edit(
${item.id},
'${item.name}',
'${item.note}'
)">
Edit
</button>

<button
onclick=
"remove(${item.id})">
Delete
</button>

</div>

`

})

}

document.getElementById(
"output"
).innerHTML=html

}

</script>

</body>
</html>
