<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(120deg,#a1c4fd,#c2e9fb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.main-card{
background:white;
width:100%;
max-width:900px;
display:flex;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.auth-panel,
.notes-panel{
padding:35px;
flex:1;
}

.auth-panel{
background:#f7faff;
}

h1{
text-align:center;
margin-bottom:25px;
}

.auth-tabs{
display:flex;
margin-bottom:20px;
}

.auth-tab{
flex:1;
padding:12px;
border:none;
background:none;
font-weight:bold;
cursor:pointer;
border-bottom:3px solid transparent;
}

.active{
border-color:#4b7bec;
color:#4b7bec;
}

.auth-form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
width:100%;
box-sizing:border-box;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.auth-btn{
background:#4b7bec;
color:white;
}

.logout-btn{
background:#f44336;
color:white;
margin-bottom:20px;
}

.note-form{
display:flex;
gap:10px;
margin-bottom:20px;
}

.note-form input{
flex:1;
}

.note-form button{
background:#4b7bec;
color:white;
}

.note-item{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-bottom:15px;
background:#f8faff;
}

.note-actions{
display:flex;
gap:10px;
margin-top:10px;
}

.note-actions button{
background:#4b7bec;
color:white;
}

.deleteBtn{
background:#f44336!important;
}

@media(max-width:800px){

.main-card{
flex-direction:column;
}

}
</style>

</head>

<body>

<div class="main-card">

<div class="auth-panel" id="authSection">

<h1>Student Notes</h1>

<div class="auth-tabs">

<button
id="signupTab"
class="auth-tab active"
onclick="switchTab('signup')">
Sign Up
</button>

<button
id="loginTab"
class="auth-tab"
onclick="switchTab('login')">
Login
</button>

</div>

<form
id="signupForm"
class="auth-form"
onsubmit="event.preventDefault();signup()">

<input
id="signup-username"
placeholder="Create Username"
required>

<input
id="signup-password"
type="password"
placeholder="Create Password"
required>

<button
class="auth-btn"
type="submit">
Create Account
</button>

</form>


<form
id="loginForm"
class="auth-form"
style="display:none"
onsubmit="event.preventDefault();login()">

<input
id="login-username"
placeholder="Username"
required>

<input
id="login-password"
type="password"
placeholder="Password"
required>

<button
class="auth-btn"
type="submit">
Login
</button>

</form>

</div>


<div
class="notes-panel"
id="notesSection"
hidden>

<button
class="logout-btn"
onclick="logout()">
Logout
</button>

<form
class="note-form"
onsubmit="event.preventDefault();save()">

<input
id="name"
placeholder="Title"
required>

<input
id="note"
placeholder="Write note"
required>

<button type="submit">
Save
</button>

</form>

<div id="output"></div>

</div>

</div>


<script>

function switchTab(type){

signupTab.classList.toggle(
"active",
type==="signup"
)

loginTab.classList.toggle(
"active",
type==="login"
)

signupForm.style.display=
type==="signup"
?"flex":"none"

loginForm.style.display=
type==="login"
?"flex":"none"

}

function showNotes(){

authSection.style.display="none"

notesSection.hidden=false

}

function showAuth(){

authSection.style.display="block"

notesSection.hidden=true

}

if(localStorage.getItem("token")){

showNotes()

load()

}

function logout(){

localStorage.removeItem(
"token"
)

location.reload()

}

async function signup(){

let username=
document.getElementById(
"signup-username"
).value.trim()

let password=
document.getElementById(
"signup-password"
).value.trim()

let res=
await fetch(
"https://student-note-app.onrender.com/signup",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
}
)

let data=
await res.json()

alert(data.message)

switchTab("login")

}

async function login(){

let username=
document.getElementById(
"login-username"
).value.trim()

let password=
document.getElementById(
"login-password"
).value.trim()

let res=
await fetch(
"https://student-note-app.onrender.com/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
}
)

let data=
await res.json()

if(data.token){

localStorage.setItem(
"token",
data.token
)

showNotes()

load()

}
else{

alert(data.message)

}

}


async function save(){

let data={

name:name.value.trim(),

note:note.value.trim()

}

let url=
"https://student-note-app.onrender.com/add"

let method="POST"

if(window.editId){

url=
`https://student-note-app.onrender.com/update/${window.editId}`

method="PUT"

}

await fetch(url,{

method,

headers:{
"Content-Type":"application/json",
token:localStorage.getItem("token")
},

body:JSON.stringify(data)

})

editId=null

name.value=""
note.value=""

load()

}

function edit(id,noteName,noteText){

name.value=noteName

note.value=noteText

window.editId=id

}

async function remove(id){

await fetch(
`https://student-note-app.onrender.com/delete/${id}`,
{
method:"DELETE",
headers:{
token:localStorage.getItem("token")
}
})

load()

}

async function load(){

let response=
await fetch(
"https://student-note-app.onrender.com/notes",
{
headers:{
token:
localStorage.getItem(
"token"
)
}
}
)

let data=
await response.json()

let html=""

if(Array.isArray(data)){

data.forEach(item=>{

html+=`

<div class="note-item">

<h3>${item.name}</h3>

<p>${item.note}</p>

<div class="note-actions">

<button onclick="edit(${item.id},'${item.name}','${item.note}')">
Edit
</button>

<button
class="deleteBtn"
onclick="remove(${item.id})">
Delete
</button>

</div>

</div>

`

})

}

output.innerHTML=html

}

</script>

</body>
</html>
